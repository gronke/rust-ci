name: Cargo build-script OUT_DIR
description: >-
  Build a package and expose its build script's OUT_DIR — the directory
  where build.rs bakes generated assets. This action IS the build step that
  produces what it resolves: it runs a JSON-messages `cargo build` and
  selects the build-script-executed message whose package id equals
  `cargo pkgid` exactly. Don't pair it as a resolver after a
  differently-configured build — a different feature or profile set owns a
  different fingerprint directory; give it the same `profile`/`args`
  instead.

inputs:
  package:
    description: >-
      Package whose build script to resolve (`cargo build -p`). Empty
      resolves the workspace's sole or root package via `cargo pkgid` — a
      larger workspace needs the name.
    required: false
    default: ""
  working-directory:
    description: Directory to run cargo in.
    required: false
    default: "."
  profile:
    description: Cargo profile (`--profile`), e.g. "release". Empty is dev.
    required: false
    default: ""
  args:
    description: Extra `cargo build` args.
    required: false
    default: ""

outputs:
  out-dir:
    description: Absolute path of the resolved build script's OUT_DIR.
    value: ${{ steps.resolve.outputs.out-dir }}

runs:
  using: composite
  steps:
    - name: Resolve OUT_DIR
      id: resolve
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        PACKAGE: ${{ inputs.package }}
        PROFILE: ${{ inputs.profile }}
        ARGS: ${{ inputs.args }}
      run: bash "$GITHUB_ACTION_PATH/cargo-out-dir.sh"
