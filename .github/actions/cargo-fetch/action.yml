name: Cargo fetch (Docker)
description: >-
  The one networked step: populate the cargo registry/git cache inside the
  pinned container, so subsequent actions can run sealed (--network none
  --offline). Requires a committed Cargo.lock (runs --locked).

inputs:
  image:
    description: CI image (Rust toolchain + clippy/rustfmt + jq).
    required: false
    default: ghcr.io/gronke/rust-ci:latest
  working-directory:
    description: Crate/workspace directory (mounted read-only).
    required: false
    default: "."
  cargo-cache:
    description: Host dir for CARGO_HOME (registry/git cache; read-write, cacheable).
    required: false
    default: .cargo-cache
  env-include:
    description: >-
      Regex (POSIX ERE) of env-var NAMES to forward from the runner into the
      container, anchored full-name. Default forwards cargo's own vars.
    required: false
    default: "CARGO_.*"
  env-exclude:
    description: >-
      Regex (POSIX ERE) of names to DROP from the included set (exclusion wins).
      Defaults to the action-owned vars; widening env-include to ".*" forwards
      secrets like GITHUB_TOKEN, so prefer a tight include or add to this list.
    required: false
    default: "CARGO_HOME|RUSTUP_HOME|CARGO_TARGET_DIR"
  env:
    description: >-
      Extra literal KEY=VALUE lines (one per line) forwarded verbatim,
      regardless of env-include/env-exclude.
    required: false
    default: ""
  git-token:
    description: >-
      Token for cloning PRIVATE git dependencies inside the container. When set,
      git is configured (url.insteadOf) to authenticate github.com fetches as
      x-access-token, and cargo is forced to fetch via the git CLI. Pass a secret
      carrying contents:read on the dependency repos; leave empty for public deps.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: cargo fetch (networked)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        IMAGE: ${{ inputs.image }}
        CARGO_CACHE: ${{ inputs.cargo-cache }}
        ENV_INCLUDE: ${{ inputs.env-include }}
        ENV_EXCLUDE: ${{ inputs.env-exclude }}
        INPUT_ENV: ${{ inputs.env }}
        GIT_TOKEN: ${{ inputs.git-token }}
      run: |
        set -euo pipefail
        mkdir -p "$CARGO_CACHE"
        # Forward env into the container (see env-include/env-exclude/env inputs);
        # CARGO_HOME/RUSTUP_HOME are pinned after --env-file (last-wins).
        ef="$(mktemp)"; trap 'rm -f "$ef"' EXIT
        env | awk -v inc="$ENV_INCLUDE" -v exc="$ENV_EXCLUDE" '
          { name = $0; sub(/=.*/, "", name) }
          inc != "" && name !~ "^(" inc ")$" { next }
          exc != "" && name ~  "^(" exc ")$" { next }
          { print }
        ' > "$ef"
        if [ -n "$INPUT_ENV" ]; then printf '%s\n' "$INPUT_ENV" >> "$ef"; fi
        # Private git deps: hand the token to the CONTAINER's git (configured in the
        # command below), never the runner's. Forwarded only as this explicit line,
        # so widening env-include can't also smuggle it.
        if [ -n "$GIT_TOKEN" ]; then printf 'CICD_GIT_TOKEN=%s\n' "$GIT_TOKEN" >> "$ef"; fi
        docker run --rm \
          --env-file "$ef" \
          --user "$(id -u):$(id -g)" \
          -e HOME=/tmp \
          -e CARGO_HOME=/cache/cargo \
          -e RUSTUP_HOME=/usr/local/rustup \
          -v "$PWD:/work:ro" \
          -v "$PWD/$CARGO_CACHE:/cache/cargo" \
          -w /work \
          "$IMAGE" bash -c '
            # With a git-token, authenticate github.com fetches as x-access-token and
            # force cargo to fetch via the git CLI so the url.insteadOf rewrite applies
            # — lets cargo clone PRIVATE git dependencies. No-op for public deps.
            if [ -n "${CICD_GIT_TOKEN:-}" ]; then
              git config --global url."https://x-access-token:${CICD_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"
              export CARGO_NET_GIT_FETCH_WITH_CLI=true
            fi
            exec cargo fetch --locked
          '
