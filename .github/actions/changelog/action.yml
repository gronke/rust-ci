name: Changelog
description: >-
  Keep a "Keep a Changelog" CHANGELOG.md coherent with the crate's declared
  version. `check` gates a pull request: entries under [Unreleased] require the
  crate version to exceed the last released baseline, and a breaking entry
  requires more than a patch bump. `cut` turns [Unreleased] into the released
  section for the crate's version, rewrites the compare link, and exports
  CHANGELOG_VERSION into the job environment.

inputs:
  mode:
    description: "`check` (pull-request gate) or `cut` (release the [Unreleased] section)."
    required: true
  package:
    description: Package name (required for a workspace with more than one member).
    required: false
    default: ""
  working-directory:
    description: Directory containing the crate or workspace.
    required: false
    default: "."
  changelog:
    description: Changelog path, relative to the working directory.
    required: false
    default: "CHANGELOG.md"
  baseline-version:
    description: >-
      check: the last released version the crate must exceed while [Unreleased]
      carries entries. Defaults to the greatest vX.Y.Z tag in the checkout
      (fetch tags for that — e.g. actions/checkout with fetch-depth 0), or
      0.0.0 when there is none.
    required: false
    default: ""
  date:
    description: "cut: the date stamped on the released section (defaults to today, UTC)."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Changelog ${{ inputs.mode }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_PACKAGE: ${{ inputs.package }}
        INPUT_CHANGELOG: ${{ inputs.changelog }}
        INPUT_BASELINE_VERSION: ${{ inputs.baseline-version }}
        INPUT_DATE: ${{ inputs.date }}
      run: bash "$GITHUB_ACTION_PATH/changelog.sh"
