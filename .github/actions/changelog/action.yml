name: Changelog
description: >-
  Keep a "Keep a Changelog" CHANGELOG.md coherent with the crate's declared
  version. `check` gates a pull request: entries under [Unreleased] require the
  crate version to exceed the last released baseline by SemVer precedence
  (1.0.0-rc1 < 1.0.0), a breaking entry requires more than a patch bump, and a
  pre-release version tolerates only stabilization content — feature entries
  (### Added, ### Removed, **Breaking) reset the version to the next regular
  release. `cut` turns [Unreleased] into the released section for the crate's
  version, rewrites the compare link, and exports CHANGELOG_VERSION into the
  job environment. `notes` renders a released section as plain text — inline
  Markdown stripped, optionally led by a `title` subject line — for a git tag
  message or a GitHub release body.

inputs:
  mode:
    description: "`check` (PR gate), `cut` (release [Unreleased]), or `notes` (render a released section as plain text)."
    required: true
  package:
    description: Package name (required for a workspace with more than one member).
    required: false
    default: ""
  working-directory:
    description: Directory containing the crate or workspace.
    required: false
    default: "."
  changelog:
    description: Changelog path, relative to the working directory.
    required: false
    default: "CHANGELOG.md"
  version:
    description: >-
      The version, overriding Cargo.toml resolution in every mode — for notes
      the section to render, for check the version the bump rule tests, for
      cut the released section's number. Required alternative for a repository
      without a crate (check falls back to section/tag coherence without it).
    required: false
    default: ""
  out:
    description: "notes: file the rendered notes are written to, relative to the working directory."
    required: false
    default: "release-notes.md"
  title:
    description: "notes: optional subject line led before the section (e.g. a git tag subject like v1.2.3)."
    required: false
    default: ""
  baseline-version:
    description: >-
      check: the last released version the crate must exceed while [Unreleased]
      carries entries. Defaults to the greatest release tag in the checkout by
      SemVer precedence, vX.Y.Z-prerelease tags included (fetch tags for that —
      e.g. actions/checkout with fetch-depth 0), or 0.0.0 when there is none.
    required: false
    default: ""
  date:
    description: "cut: the date stamped on the released section (defaults to today, UTC)."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Changelog ${{ inputs.mode }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_PACKAGE: ${{ inputs.package }}
        INPUT_CHANGELOG: ${{ inputs.changelog }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_OUT: ${{ inputs.out }}
        INPUT_TITLE: ${{ inputs.title }}
        INPUT_BASELINE_VERSION: ${{ inputs.baseline-version }}
        INPUT_DATE: ${{ inputs.date }}
      run: bash "$GITHUB_ACTION_PATH/changelog.sh"
