name: Install Rust toolchain
description: >-
  Install Rust via rustup (toolchain, components, targets) and put
  ~/.cargo/bin on PATH. Avoids third-party toolchain actions so behaviour does
  not drift with the runner image.

inputs:
  toolchain:
    description: Toolchain passed to rustup (e.g. stable, 1.77.2).
    required: false
    default: stable
  components:
    description: Space-separated rustup components to add (e.g. "rustfmt clippy").
    required: false
    default: ""
  targets:
    description: Space-separated rustup targets to add (e.g. "x86_64-apple-darwin").
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      shell: bash
      env:
        TOOLCHAIN: ${{ inputs.toolchain }}
        COMPONENTS: ${{ inputs.components }}
        TARGETS: ${{ inputs.targets }}
      run: bash "$GITHUB_ACTION_PATH/install-toolchain.sh"
