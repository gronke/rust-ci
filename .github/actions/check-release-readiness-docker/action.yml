name: Check release readiness (Docker)
description: >-
  Run the release-readiness checks inside the pinned container (jq is baked in).
  Networked — it needs the crates.io index for `cargo publish --dry-run` and the
  not-already-published probe. Runs --locked against a read-only workdir.

inputs:
  image:
    description: CI image (Rust toolchain + jq).
    required: false
    default: ghcr.io/gronke/rust-ci:latest
  working-directory:
    description: Crate/workspace directory (mounted read-only).
    required: false
    default: "."
  target-dir:
    description: Host dir for cargo target (read-write).
    required: false
    default: target
  cargo-cache:
    description: Host dir for CARGO_HOME (read-write).
    required: false
    default: .cargo-cache
  package:
    description: Package name to check (required for a workspace with >1 member).
    required: false
    default: ""
  expected-version:
    description: Version the crate must declare (else derived from a v* tag).
    required: false
    default: ""
  run-tests:
    description: Also run cargo test --workspace.
    required: false
    default: "false"
  env-include:
    description: >-
      Regex (POSIX ERE) of env-var NAMES to forward from the runner into the
      container, anchored full-name. Default forwards cargo's own vars.
    required: false
    default: "CARGO_.*"
  env-exclude:
    description: >-
      Regex (POSIX ERE) of names to DROP from the included set (exclusion wins).
      Defaults to the action-owned vars; widening env-include to ".*" forwards
      secrets like GITHUB_TOKEN, so prefer a tight include or add to this list.
    required: false
    default: "CARGO_HOME|RUSTUP_HOME|CARGO_TARGET_DIR"
  env:
    description: >-
      Extra literal KEY=VALUE lines (one per line) forwarded verbatim,
      regardless of env-include/env-exclude.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: check release readiness
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        IMAGE: ${{ inputs.image }}
        TARGET_DIR: ${{ inputs.target-dir }}
        CARGO_CACHE: ${{ inputs.cargo-cache }}
        INPUT_PACKAGE: ${{ inputs.package }}
        INPUT_EXPECTED_VERSION: ${{ inputs.expected-version }}
        INPUT_RUN_TESTS: ${{ inputs.run-tests }}
        ENV_INCLUDE: ${{ inputs.env-include }}
        ENV_EXCLUDE: ${{ inputs.env-exclude }}
        INPUT_ENV: ${{ inputs.env }}
      run: |
        set -euo pipefail
        mkdir -p "$TARGET_DIR" "$CARGO_CACHE"
        # Forward env into the container (see env-include/env-exclude/env inputs);
        # owner-vars pinned after --env-file (last-wins).
        ef="$(mktemp)"; trap 'rm -f "$ef"' EXIT
        env | awk -v inc="$ENV_INCLUDE" -v exc="$ENV_EXCLUDE" '
          { name = $0; sub(/=.*/, "", name) }
          inc != "" && name !~ "^(" inc ")$" { next }
          exc != "" && name ~  "^(" exc ")$" { next }
          { print }
        ' > "$ef"
        if [ -n "$INPUT_ENV" ]; then printf '%s\n' "$INPUT_ENV" >> "$ef"; fi
        docker run --rm \
          --env-file "$ef" \
          --user "$(id -u):$(id -g)" \
          -e HOME=/tmp \
          -e CARGO_HOME=/cache/cargo \
          -e RUSTUP_HOME=/usr/local/rustup \
          -e CARGO_TARGET_DIR=/work/target \
          -e INPUT_PACKAGE="$INPUT_PACKAGE" \
          -e INPUT_EXPECTED_VERSION="$INPUT_EXPECTED_VERSION" \
          -e INPUT_RUN_TESTS="$INPUT_RUN_TESTS" \
          -e GITHUB_REF="${GITHUB_REF:-}" \
          -v "$PWD:/work:ro" \
          -v "$PWD/$TARGET_DIR:/work/target" \
          -v "$PWD/$CARGO_CACHE:/cache/cargo" \
          -v "$GITHUB_ACTION_PATH:/cicd:ro" \
          -w /work \
          "$IMAGE" bash /cicd/check-release-readiness.sh
