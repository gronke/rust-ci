name: Lint and test
description: >-
  Run cargo fmt --check, clippy (deny warnings), and cargo test for one feature
  universe. Call it once per universe to build a default / all-features /
  no-default-features matrix; enable `fmt` on a single leg to avoid repeating it.

inputs:
  working-directory:
    description: Directory to run cargo in.
    required: false
    default: "."
  features:
    description: >-
      Feature flag applied to clippy and test (e.g. "--all-features" or
      "--no-default-features"). Empty means the default feature set.
    required: false
    default: ""
  fmt:
    description: Run `cargo fmt --all -- --check` (universe-independent).
    required: false
    default: "true"
  clippy:
    description: Run clippy with `-D warnings`.
    required: false
    default: "true"
  test:
    description: Run `cargo test`.
    required: false
    default: "true"
  clippy-args:
    description: Extra clippy args, placed before `-- -D warnings`.
    required: false
    default: "--all-targets"
  test-args:
    description: Extra `cargo test` args.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Lint and test
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        FMT: ${{ inputs.fmt }}
        CLIPPY: ${{ inputs.clippy }}
        TEST: ${{ inputs.test }}
        FEATURES: ${{ inputs.features }}
        CLIPPY_ARGS: ${{ inputs.clippy-args }}
        TEST_ARGS: ${{ inputs.test-args }}
      run: bash "$GITHUB_ACTION_PATH/lint-and-test.sh"
