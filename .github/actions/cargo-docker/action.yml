name: Cargo (Docker, sealed)
description: >-
  Run one cargo command inside the pinned container — non-root, all caps dropped,
  no-new-privileges, repo mounted read-only. Sealed by default (--network none +
  cargo --offline; run cargo-fetch first to warm the cache); set offline:false to
  run networked and fetch as it builds. The low-level primitive behind the sealed
  build / publish-dry-run steps.

inputs:
  image:
    description: CI image (Rust toolchain + clippy/rustfmt + jq).
    required: false
    default: rust-ci:latest
  working-directory:
    description: Crate/workspace directory (mounted read-only).
    required: false
    default: "."
  args:
    description: >-
      The cargo command + flags, e.g. "build --release --locked --features full".
      Do NOT include --offline — the `offline` input controls it.
    required: true
  target-dir:
    description: Host dir for cargo target (read-write, cacheable).
    required: false
    default: target
  cargo-cache:
    description: Host dir for CARGO_HOME (read-write; populated by cargo-fetch).
    required: false
    default: .cargo-cache
  offline:
    description: >-
      Run sealed: --network none + cargo --offline (needs a prior cargo-fetch to
      populate the cache). Set "false" to run networked and fetch as it builds.
      Default "true".
    required: false
    default: "true"
  out-dir-package:
    description: >-
      When set, additionally resolve this package's build-script OUT_DIR
      (a sealed `cargo build --message-format=json` replay) and expose it,
      translated to the host side of `target-dir`, as the `out-dir` output.
      Needs a non-empty `target-dir` and an image with cargo ≥1.77.
    required: false
    default: ""
  out-dir-args:
    description: >-
      Extra args for the resolve build. Mirror the main args' profile and
      features so the replay is free; an empty value after a `--release`
      main build correctly resolves the DEV profile's directory instead.
      Do NOT include --offline — the `offline` input controls it.
    required: false
    default: ""
  env-include:
    description: >-
      Regex (POSIX ERE) of env-var NAMES to forward from the runner into the
      container, anchored full-name. Default forwards cargo's own vars.
    required: false
    default: "CARGO_.*"
  env-exclude:
    description: >-
      Regex (POSIX ERE) of names to DROP from the included set (exclusion wins).
      Defaults to the action-owned vars; widening env-include to ".*" forwards
      secrets like GITHUB_TOKEN, so prefer a tight include or add to this list.
    required: false
    default: "CARGO_HOME|RUSTUP_HOME|CARGO_TARGET_DIR"
  env:
    description: >-
      Extra literal KEY=VALUE lines (one per line) forwarded verbatim,
      regardless of env-include/env-exclude.
    required: false
    default: ""

outputs:
  out-dir:
    description: >-
      Host path of the out-dir-package build script's OUT_DIR; empty when
      out-dir-package is unset.
    value: ${{ steps.resolve.outputs.out-dir }}

runs:
  using: composite
  steps:
    - name: cargo (sealed)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        IMAGE: ${{ inputs.image }}
        TARGET_DIR: ${{ inputs.target-dir }}
        CARGO_CACHE: ${{ inputs.cargo-cache }}
        OFFLINE: ${{ inputs.offline }}
        ENV_INCLUDE: ${{ inputs.env-include }}
        ENV_EXCLUDE: ${{ inputs.env-exclude }}
        INPUT_ENV: ${{ inputs.env }}
        ARGS: ${{ inputs.args }}
      run: |
        set -euo pipefail
        # shellcheck source=/dev/null
        source "$GITHUB_ACTION_PATH/../_lib/seal.sh"
        export CICD_DIR="$GITHUB_ACTION_PATH"
        # ARGS + OFFLINE aren't CARGO_* (so env-include won't forward them); inject
        # them as explicit env-file lines for the in-container script.
        EXTRA_ENV="$(printf '%s\n%s' "ARGS=$ARGS" "OFFLINE=$OFFLINE")"
        export EXTRA_ENV
        seal_run bash /cicd/cargo-docker.sh

    - name: Resolve OUT_DIR (sealed)
      id: resolve
      if: inputs.out-dir-package != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        IMAGE: ${{ inputs.image }}
        TARGET_DIR: ${{ inputs.target-dir }}
        CARGO_CACHE: ${{ inputs.cargo-cache }}
        OFFLINE: ${{ inputs.offline }}
        ENV_INCLUDE: ${{ inputs.env-include }}
        ENV_EXCLUDE: ${{ inputs.env-exclude }}
        INPUT_ENV: ${{ inputs.env }}
        OUT_DIR_PACKAGE: ${{ inputs.out-dir-package }}
        OUT_DIR_ARGS: ${{ inputs.out-dir-args }}
      run: bash "$GITHUB_ACTION_PATH/cargo-docker-out-dir.sh"
