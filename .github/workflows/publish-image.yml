name: publish-image

# Build the CI image and push it to GHCR. The package is set PUBLIC once, so
# consumers pull it with no `docker login`. Plain docker (no third-party
# actions) keeps within the "official actions/* or org-owned only" policy.
on:
  push:
    branches: [main]
    paths:
      - 'image/**'
      - '.github/workflows/publish-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: build + push GHCR image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build and push
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/rust-ci"
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build -t "${image}:latest" image/
          docker push "${image}:latest"
          echo "pushed ${image}:latest"
